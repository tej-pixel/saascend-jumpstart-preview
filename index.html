<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SaaScend Jumpstart — Preview Versions</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0d1f3c;--cyan:#00c2e8;--muted:#5a6b85;--border:#e3e8f0;--off-white:#f6f8fb}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Sora',sans-serif;background:var(--off-white);color:var(--navy);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .wrap{max-width:560px;width:100%;background:#fff;border:1px solid var(--border);border-radius:18px;padding:36px;box-shadow:0 12px 40px rgba(13,31,60,.06)}
  h1{font-size:1.4rem;font-weight:800;letter-spacing:-.01em;margin-bottom:6px}
  .sub{color:var(--muted);font-size:.85rem;margin-bottom:28px}
  .v-list{display:flex;flex-direction:column;gap:10px}
  a.v{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--off-white);border:1px solid var(--border);border-radius:12px;text-decoration:none;color:var(--navy);font-weight:600;font-size:.9rem;transition:all .18s}
  a.v:hover{border-color:var(--cyan);background:#fff;transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,194,232,.12)}
  a.v .arrow{color:var(--cyan);font-weight:800}
  .tag{display:inline-block;padding:3px 9px;background:rgba(0,194,232,.1);color:var(--cyan);border-radius:6px;font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-left:8px}
  footer{margin-top:28px;padding-top:20px;border-top:1px solid var(--border);font-size:.72rem;color:var(--muted);text-align:center}
</style>
</head>
<body>
  <div class="wrap">
    <h1>SaaScend Quickstart — Preview</h1>
    <div class="sub">Internal preview builds. Pick a version to view.</div>
    <div class="v-list">
      <a class="v" href="v13/">v13 <span class="tag">latest</span><span class="arrow">→</span></a>
      <a class="v" href="v12/">v12<span class="arrow">→</span></a>
    </div>
    <footer>SaaScend internal · not for client distribution</footer>
  </div>
</body>
</html>
